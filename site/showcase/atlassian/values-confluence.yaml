image:
  repository: torque.local/atlassian/confluence
  tag: 10.2.10-custom-20260510
  pullPolicy: IfNotPresent

database:
  type: postgresql
  url: jdbc:postgresql://confluence-db:5432/confluence
  credentials:
    secretName: confluence-db-credentials

volumes:
  localHome:
    persistentVolumeClaim:
      create: true
      storageClassName: local-path
      resources:
        requests:
          storage: 10Gi
  sharedHome:
    nfsPermissionFixer:
      enabled: false
    persistentVolumeClaim:
      create: true
      storageClassName: nfs-client
      resources:
        requests:
          storage: 10Gi

confluence:
  securityContext:
    fsGroup: 2002
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 2002
    runAsGroup: 2002
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  service:
    type: NodePort
    nodePort: 31081
    contextPath: /confluence
  readinessProbe:
    enabled: false

gateway:
  create: false
  hostnames:
    - 91.206.14.44
  https: false
  externalPort: 31081
  path: /confluence

synchrony:
  securityContext:
    fsGroup: 2002
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 2002
    runAsGroup: 2002
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
