image:
  repository: torque.local/atlassian/nfs-client
  tag: v4.0.2-custom-20260510
  pullPolicy: IfNotPresent

nfs:
  server: 91.206.14.44
  path: /srv/k3s-nfs

storageClass:
  name: nfs-client
  defaultClass: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 256Mi
