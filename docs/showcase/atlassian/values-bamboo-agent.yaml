image:
  repository: torque.local/atlassian/bamboo-agent-base
  tag: 12.1.6-custom-20260510
  pullPolicy: IfNotPresent

agent:
  securityContext:
    fsGroup: 2005
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 2005
    runAsGroup: 2005
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  securityToken:
    secretName: bamboo-agent-token
  server: bamboo.atlassian.svc.cluster.local
  serverProtocol: http

replicaCount: 1
