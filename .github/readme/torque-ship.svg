<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">torque ship subcommand demo</title>
  <desc id="desc">Animated terminal-style demo showing torque ship build, verify, plan, apply, and explain steps with evidence artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151c"/>
      <stop offset="0.48" stop-color="#08090d"/>
      <stop offset="1" stop-color="#161016"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171b23"/>
      <stop offset="1" stop-color="#0d0f14"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7edaee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7edaee" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#edf1f5" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.49 0 0 0 0 0.85 0 0 0 0 0.93 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Code", ui-monospace, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
      .muted { fill: #a7aeb8; }
      .bright { fill: #f8fafc; }
      .accent { fill: #7edaee; }
      .panel { fill: url(#panel); stroke: rgba(237,241,245,0.16); stroke-width: 1.2; }
      .stage { animation: stagePulse 6s ease-in-out infinite; }
      .stage:nth-of-type(1) { animation-delay: 0s; }
      .stage:nth-of-type(2) { animation-delay: 0.9s; }
      .stage:nth-of-type(3) { animation-delay: 1.8s; }
      .stage:nth-of-type(4) { animation-delay: 2.7s; }
      .stage:nth-of-type(5) { animation-delay: 3.6s; }
      .terminal-line { opacity: 0.34; animation: lineReveal 6s steps(1, end) infinite; }
      .terminal-line.l1 { animation-delay: 0.1s; }
      .terminal-line.l2 { animation-delay: 1.0s; }
      .terminal-line.l3 { animation-delay: 1.9s; }
      .terminal-line.l4 { animation-delay: 2.8s; }
      .terminal-line.l5 { animation-delay: 3.7s; }
      .terminal-line.l6 { animation-delay: 4.6s; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      .scan { animation: scan 5.4s cubic-bezier(0.37,0,0.2,1) infinite; }
      .dash { stroke-dasharray: 10 10; animation: dash 1.2s linear infinite; }
      @keyframes stagePulse {
        0%, 14%, 100% { opacity: 0.52; transform: translateY(0); }
        20%, 34% { opacity: 1; transform: translateY(-6px); }
        42% { opacity: 0.72; transform: translateY(0); }
      }
      @keyframes lineReveal {
        0%, 8% { opacity: 0.34; }
        10%, 78% { opacity: 1; }
        80%, 100% { opacity: 0.46; }
      }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }
      @keyframes scan {
        0%, 16% { opacity: 0; transform: translateX(-420px); }
        35%, 65% { opacity: 0.42; }
        88%, 100% { opacity: 0; transform: translateX(420px); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -20; }
      }
    </style>
  </defs>

  <rect width="1200" height="620" rx="0" fill="url(#bg)"/>
  <path d="M0 84h1200M0 198h1200M0 312h1200M0 426h1200M0 540h1200M120 0v620M360 0v620M600 0v620M840 0v620M1080 0v620" stroke="#ffffff" stroke-opacity="0.035"/>
  <rect x="36" y="34" width="1128" height="552" rx="18" fill="#06070a" stroke="#edf1f5" stroke-opacity="0.12"/>

  <g transform="translate(66 64)">
    <rect width="1068" height="216" rx="14" class="panel"/>
    <circle cx="24" cy="24" r="6" fill="#ef6a6a"/>
    <circle cx="46" cy="24" r="6" fill="#e8c468"/>
    <circle cx="68" cy="24" r="6" fill="#74d28a"/>
    <text x="92" y="29" class="mono muted" font-size="15">torque ship</text>
    <text x="28" y="70" class="mono bright" font-size="18">$ torque ship --chart ./chart --release api -n prod \</text>
    <text x="48" y="102" class="mono bright" font-size="18">--build . --tag ghcr.io/acme/api:dev --yes</text>
    <rect class="cursor" x="548" y="86" width="10" height="22" rx="2" fill="#7edaee"/>

    <g class="terminal-line l1">
      <text x="28" y="146" class="mono accent" font-size="16">ship: build</text>
      <text x="172" y="146" class="mono muted" font-size="16">image + build.sqlite + attestations</text>
    </g>
    <g class="terminal-line l2">
      <text x="28" y="176" class="mono accent" font-size="16">ship: verify</text>
      <text x="172" y="176" class="mono muted" font-size="16">verify.json gate accepted</text>
    </g>
    <g class="terminal-line l3">
      <text x="610" y="146" class="mono accent" font-size="16">ship: plan</text>
      <text x="740" y="146" class="mono muted" font-size="16">plan.json ready for review</text>
    </g>
    <g class="terminal-line l4">
      <text x="610" y="176" class="mono accent" font-size="16">ship: apply</text>
      <text x="740" y="176" class="mono muted" font-size="16">apply.sqlite captured</text>
    </g>
    <g class="terminal-line l5">
      <text x="610" y="206" class="mono accent" font-size="16">ship: explain</text>
      <text x="740" y="206" class="mono muted" font-size="16">summary written</text>
    </g>
  </g>

  <g transform="translate(94 342)">
    <path id="flowPath" d="M70 72H240H410H580H750H920" fill="none" stroke="url(#line)" stroke-width="4"/>
    <path d="M70 72H920" fill="none" stroke="#7edaee" stroke-opacity="0.24" stroke-width="2" class="dash"/>
    <circle r="9" fill="#edf1f5" filter="url(#softGlow)">
      <animateMotion dur="6s" repeatCount="indefinite" path="M70 72H240H410H580H750H920"/>
    </circle>

    <g class="stage" transform="translate(0 0)">
      <rect width="140" height="144" rx="14" class="panel"/>
      <text x="70" y="36" text-anchor="middle" class="mono accent" font-size="15">BUILD</text>
      <text x="70" y="70" text-anchor="middle" class="sans bright" font-size="28" font-weight="760">OK</text>
      <text x="70" y="104" text-anchor="middle" class="mono muted" font-size="13">build.sqlite</text>
      <text x="70" y="126" text-anchor="middle" class="mono muted" font-size="13">image tag</text>
    </g>
    <g class="stage" transform="translate(170 0)">
      <rect width="140" height="144" rx="14" class="panel"/>
      <text x="70" y="36" text-anchor="middle" class="mono accent" font-size="15">VERIFY</text>
      <text x="70" y="70" text-anchor="middle" class="sans bright" font-size="28" font-weight="760">OK</text>
      <text x="70" y="104" text-anchor="middle" class="mono muted" font-size="13">verify.json</text>
      <text x="70" y="126" text-anchor="middle" class="mono muted" font-size="13">fail-on gate</text>
    </g>
    <g class="stage" transform="translate(340 0)">
      <rect width="140" height="144" rx="14" class="panel"/>
      <text x="70" y="36" text-anchor="middle" class="mono accent" font-size="15">PLAN</text>
      <text x="70" y="70" text-anchor="middle" class="sans bright" font-size="28" font-weight="760">OK</text>
      <text x="70" y="104" text-anchor="middle" class="mono muted" font-size="13">plan.json</text>
      <text x="70" y="126" text-anchor="middle" class="mono muted" font-size="13">review diff</text>
    </g>
    <g class="stage" transform="translate(510 0)">
      <rect width="140" height="144" rx="14" class="panel"/>
      <text x="70" y="36" text-anchor="middle" class="mono accent" font-size="15">APPLY</text>
      <text x="70" y="70" text-anchor="middle" class="sans bright" font-size="28" font-weight="760">OK</text>
      <text x="70" y="104" text-anchor="middle" class="mono muted" font-size="13">apply.sqlite</text>
      <text x="70" y="126" text-anchor="middle" class="mono muted" font-size="13">rollout log</text>
    </g>
    <g class="stage" transform="translate(680 0)">
      <rect width="140" height="144" rx="14" class="panel"/>
      <text x="70" y="36" text-anchor="middle" class="mono accent" font-size="15">EXPLAIN</text>
      <text x="70" y="70" text-anchor="middle" class="sans bright" font-size="28" font-weight="760">OK</text>
      <text x="70" y="104" text-anchor="middle" class="mono muted" font-size="13">ship.md</text>
      <text x="70" y="126" text-anchor="middle" class="mono muted" font-size="13">ship.json</text>
    </g>
    <g transform="translate(850 0)">
      <rect width="190" height="144" rx="14" fill="#111820" stroke="#7edaee" stroke-opacity="0.34"/>
      <text x="24" y="36" class="mono accent" font-size="15">EVIDENCE DIR</text>
      <text x="24" y="70" class="mono bright" font-size="16">dist/torque-ship-api</text>
      <text x="24" y="102" class="mono muted" font-size="13">captures, reports, plan</text>
      <text x="24" y="124" class="mono muted" font-size="13">one portable bundle</text>
    </g>
  </g>

  <rect class="scan" x="0" y="34" width="220" height="552" fill="url(#line)" opacity="0"/>
  <text x="66" y="570" class="mono muted" font-size="14">single command: build -> verify -> plan -> apply -> explain -> evidence</text>
</svg>
